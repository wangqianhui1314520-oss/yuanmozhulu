# =============================================================================
# 元末逐鹿 3.0 · Nginx 生产配置
# 域名: qiankuntokenyun.cn
# 支持 HTTP → HTTPS 自动跳转
# =============================================================================

# ---- 速率限制定义 ----
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

# ---- HTTP → HTTPS 重定向 ----
server {
    listen 80;
    server_name qiankuntokenyun.cn www.qiankuntokenyun.cn;

    # Let's Encrypt ACME 验证
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---- HTTPS 主服务 ----
server {
    listen 443 ssl http2;
    server_name qiankuntokenyun.cn www.qiankuntokenyun.cn;

    # SSL 证书（部署时手动放置到 deploy/nginx/ssl/）
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    # SSL 安全配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    client_max_body_size 10M;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml application/wasm;

    root /usr/share/nginx/html;
    index index.html;

    # 静态资源缓存
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /data/ {
        expires 7d;
        add_header Cache-Control "public";
    }

    # API 反向代理
    location /api/ {
        limit_req zone=api_limit burst=50 nodelay;
        limit_req_status 429;
        proxy_pass http://backend:8800;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
    }

    # SPA 路由回退
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # 隐藏文件拒绝访问
    location ~ /\. {
        deny all;
        access_log off;
    }
}
