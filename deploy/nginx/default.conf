# =============================================================================
# 元末逐鹿 3.0 · Nginx 生产配置
# 使用前将 YOUR_DOMAIN.com 替换为你的域名
# =============================================================================

# ---- 速率限制定义 ----
# 全局 API 限流：每个 IP 每秒 30 请求，突发 50（足够正常游戏，防止滥用）
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

# ---- HTTP → HTTPS 重定向 ----
server {
    listen 80;
    server_name YOUR_DOMAIN.com www.YOUR_DOMAIN.com;

    # Let's Encrypt 验证
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 其余全部跳转 HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ---- HTTPS 主服务 ----
server {
    listen 443 ssl http2;
    server_name YOUR_DOMAIN.com www.YOUR_DOMAIN.com;

    # ========== SSL 证书 ==========
    # 方式1：Let's Encrypt (推荐)
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    # 方式2：阿里云免费证书（下载后放 ssl/ 目录）
    # ssl_certificate     /etc/nginx/ssl/YOUR_DOMAIN.pem;
    # ssl_certificate_key /etc/nginx/ssl/YOUR_DOMAIN.key;

    # SSL 安全配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # ========== 基础配置 ==========
    client_max_body_size 10M;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml application/wasm;

    # ========== 安全响应头 ==========
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ========== 前端静态文件 ==========
    root /usr/share/nginx/html;
    index index.html;

    # 静态资源长期缓存
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # 地图数据缓存
    location /data/ {
        expires 7d;
        add_header Cache-Control "public";
    }

    # ========== API 反向代理 ==========
    location /api/ {
        # 速率限制（每 IP 30 req/s，突发50）
        limit_req zone=api_limit burst=50 nodelay;
        limit_req_status 429;

        proxy_pass http://backend:8800;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # LLM 调用超时较长
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_connect_timeout 10s;

        # WebSocket（可选）
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 缓冲
        proxy_buffering off;
    }

    # ========== SPA 路由回退 ==========
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # ========== 禁止访问隐藏文件 ==========
    location ~ /\. {
        deny all;
        access_log off;
    }
}
