# =============================================================================
# 元末逐鹿 3.0 · Docker Compose 生产部署
# 用法: docker compose -f deploy/docker-compose.yml up -d
# =============================================================================
version: "3.8"

services:
  # ---- 后端 API 服务 ----
  backend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: yuanmo-backend
    restart: unless-stopped
    expose:
      - "8800"
    environment:
      # 玩家自带 Key 模式：不设置 TENCENT_API_KEY 即可，玩家在前端配置自己的密钥
      - TENCENT_API_KEY=${TENCENT_API_KEY:-}
      - YUANMO_CORS_ORIGINS=${YUANMO_CORS_ORIGINS:-}
      - YUANMO_SESSION_TTL=${YUANMO_SESSION_TTL:-1800}
      - YUANMO_CLEANUP_INTERVAL=${YUANMO_CLEANUP_INTERVAL:-300}
      - PYTHONUNBUFFERED=1
    volumes:
      # 持久化数据目录（存档、NPC 记忆等不会因容器重建丢失）
      - ../data:/app/data
      - ../logs:/app/logs
    networks:
      - yuanmo-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8800/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ---- Nginx 反向代理 ----
  nginx:
    image: nginx:1.25-alpine
    container_name: yuanmo-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ../frontend/dist:/usr/share/nginx/html:ro
      # SSL 证书（部署时手动放置）
      - ./nginx/ssl:/etc/nginx/ssl:ro
      # Nginx 日志持久化
      - ../logs/nginx:/var/log/nginx
    networks:
      - yuanmo-net
    depends_on:
      backend:
        condition: service_healthy

networks:
  yuanmo-net:
    driver: bridge
