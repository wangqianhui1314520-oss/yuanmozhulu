# =============================================================================
# CloudStudio 一键部署规则
# 元末逐鹿 3.0 · 回合制国风策略推演
# =============================================================================

[deploy]
name = "元末逐鹿3.0"
description = "回合制国风策略推演 · 六边形乱世AI国策"
framework = "docker"

# 多阶段 Docker 构建: Node.js 前端 → Python+Nginx 后端
dockerfile = "Dockerfile"

# 前端构建
[build.frontend]
command = "npm run build"
workdir = "frontend"
output = "frontend/dist"

# 后端依赖
[build.backend]
requirements = "server/requirements.txt"

# 运行时端口
[ports]
http = 80
api = 8800

# 健康检查
[health]
endpoint = "/api/health"
expect_status = 200
startup_timeout = 30

# 环境变量（部署时需配置）
[env]
TENCENT_API_KEY = { description = "腾讯混元/DeepSeek API密钥", required = true, secret = true }
TENCENT_TOKENHUB_URL = { description = "API基地址", required = false, default = "https://copilot.tencent.com/v2" }
PYTHONUTF8 = { description = "UTF-8编码", required = false, default = "1" }
